[book]
title = "The Bynk Book"
authors = ["Matthew Gibbons"]
description = "The official guide and reference for the Bynk programming language."
language = "en"
src = "src"

# Syntax-highlight ```bynk code blocks using the tree-sitter-bynk grammar.
# Build the binary first: `cargo build --release -p mdbook-bynk-highlight`.
[preprocessor.bynk-highlight]
command = "../target/release/mdbook-bynk-highlight"
renderers = ["html"]

# Embed a single grammar production with `{{#grammar <rule>}}`, rendered from the
# grammar so it cannot drift. Build first: `cargo build --release -p
# mdbook-bynk-grammar`. `before` is belt-and-braces; we emit `ebnf`, so ordering
# against the highlighter doesn't actually matter.
[preprocessor.bynk-grammar]
command = "../target/release/mdbook-bynk-grammar"
renderers = ["html"]
grammar = "../tree-sitter-bynk/src/grammar.json"
# Generated by `cargo test -p bynkc --test diagnostics_registry`. Consumed by
# `{{#grammar-semantics <rule>}}`, which lists the diagnostics governing a rule.
semantics = "grammar-semantics.json"
before = ["bynk-highlight"]

# Diagrams and callouts. ` ```mermaid ` fences become `<pre class="mermaid">`
# (rendered by the vendored theme/mermaid.min.js); `> [!NOTE|TIP|WARNING|DANGER]`
# blockquotes become styled callouts (theme/bynk-callouts.css). Build first:
# `cargo build --release -p mdbook-bynk-visuals`.
[preprocessor.bynk-visuals]
command = "../target/release/mdbook-bynk-visuals"
# Also run for linkcheck: otherwise a `[!KIND]` callout marker reaches the
# linkcheck renderer untransformed and is misread as a broken link reference.
renderers = ["html", "linkcheck"]

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
# The project's GitHub Pages sub-path. Makes absolute links (notably the
# generated 404 page) resolve correctly when hosted at accuser.github.io/bynk/.
# Note: this also prefixes paths during local `mdbook serve`.
site-url = "/bynk/"
git-repository-url = "https://github.com/accuser/bynk"
edit-url-template = "https://github.com/accuser/bynk/edit/main/docs/{path}"
additional-css = ["theme/bynk-highlight.css", "theme/bynk-callouts.css"]
# Vendored (no CDN at build time) so the build stays deterministic and offline.
# Order matters: mermaid.min.js sets `globalThis.mermaid`, then the init runs it.
additional-js = ["theme/mermaid.min.js", "theme/mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

# Validate links at build time. Internal (cross-page) links are checked and a
# broken one fails the build. External web links are not followed, to keep the
# build deterministic and offline-friendly in CI; flip `follow-web-links` to
# true for an occasional manual external-link audit.
[output.linkcheck]
follow-web-links = false
warning-policy = "error"

# Note: the external mdbook-admonish / mdbook-mermaid / mdbook-toc preprocessors
# were re-evaluated and not adopted — their current releases target the mdBook 0.5
# preprocessor protocol, while this book is pinned to 0.4.51 (mdbook-linkcheck
# targets 0.4), and they would add CDN/asset-install coupling in CI. Instead,
# diagrams and callouts go through the in-house `mdbook-bynk-visuals` preprocessor
# (matching bynk-highlight / bynk-grammar) with a vendored mermaid.min.js, keeping
# the build deterministic, offline, and version-pinned. mdbook-toc is still unused.

# v0.31: concern-first reorg (ADR 0060 applied to the book). Old paths
# redirect to their new concern homes for external/bookmarked links.
[output.html.redirect]
