[book]
title = "The Karn Book"
authors = ["Matthew Gibbons"]
description = "The official guide and reference for the Karn programming language."
language = "en"
src = "src"

# Syntax-highlight ```karn code blocks using the tree-sitter-karn grammar.
# Build the binary first: `cargo build --release -p mdbook-karn-highlight`.
[preprocessor.karn-highlight]
command = "../target/release/mdbook-karn-highlight"
renderers = ["html"]

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
# The project's GitHub Pages sub-path. Makes absolute links (notably the
# generated 404 page) resolve correctly when hosted at accuser.github.io/karn/.
# Note: this also prefixes paths during local `mdbook serve`.
site-url = "/karn/"
git-repository-url = "https://github.com/accuser/karn"
edit-url-template = "https://github.com/accuser/karn/edit/main/docs/{path}"
additional-css = ["theme/karn-highlight.css"]

[output.html.fold]
enable = true
level = 1

# Validate links at build time. Internal (cross-page) links are checked and a
# broken one fails the build. External web links are not followed, to keep the
# build deterministic and offline-friendly in CI; flip `follow-web-links` to
# true for an occasional manual external-link audit.
[output.linkcheck]
follow-web-links = false
warning-policy = "error"

# Note: the mdbook-admonish / mdbook-mermaid / mdbook-toc preprocessors were
# evaluated but not adopted — their current releases are incompatible with the
# available mdBook (the preprocessor JSON protocol is mid-transition across the
# mdBook 0.4→0.5 boundary). Callouts use blockquotes and diagrams use ASCII art,
# both dependency-free. Revisit once the ecosystem settles on a common version.
