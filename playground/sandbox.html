<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bynk sandbox</title>
    <!-- Served from the sandbox origin and embedded by the app as
         <iframe sandbox="allow-scripts">. No UI: it only links + runs a compiled
         module graph in a Web Worker and posts results back. -->
  </head>
  <body>
    <!-- A classic (non-module) script: a sandboxed opaque-origin iframe cannot load
         a `type=module` script (module fetches are CORS-mode; a null origin fails).
         A classic script is no-cors and runs; it dynamic-`import()`s the blob graph. -->
    <script src="./sandbox.js"></script>
  </body>
</html>
