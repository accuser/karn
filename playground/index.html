<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bynk Playground</title>
    <style>
      :root { color-scheme: dark; --bg: #0f111a; --panel: #1a1d2b; --line: #2a2e42; --fg: #eeffff; --muted: #8a90b0; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
        font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; }
      #app { display: grid; grid-template-rows: auto 1fr; height: 100%; }
      header { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--line); }
      header h1 { font-size: 15px; margin: 0; font-weight: 600; }
      header .spacer { flex: 1; }
      button { background: #3b4cca; color: #fff; border: 0; border-radius: 6px; padding: 7px 14px;
        font: inherit; font-weight: 600; cursor: pointer; }
      button.secondary { background: var(--panel); border: 1px solid var(--line); color: var(--fg); }
      select#examples { background: var(--panel); color: var(--fg); border: 1px solid var(--line);
        border-radius: 6px; padding: 6px 10px; font: inherit; cursor: pointer; }
      #status { color: var(--muted); font-size: 13px; }
      #status[data-kind="error"] { color: #ff5370; }
      #status[data-kind="ok"] { color: #c3e88d; }
      #status[data-kind="busy"] { color: #ffcb6b; }
      main { display: grid; grid-template-columns: 1fr 1fr; min-height: 0; }
      #editor { min-height: 0; border-right: 1px solid var(--line); overflow: hidden; }
      .cm-editor { height: 100%; font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace; }
      #side { display: grid; grid-template-rows: auto auto 1fr; min-height: 0; }
      #unsupported { background: #4a2530; color: #ffb3c0; padding: 8px 14px; border-bottom: 1px solid var(--line); font-size: 13px; }
      #diagnostics { border-bottom: 1px solid var(--line); max-height: 35%; overflow: auto; }
      #diagnostics.empty { display: none; }
      .diag { padding: 6px 14px; border-bottom: 1px solid var(--line); font: 12px/1.5 ui-monospace, monospace; }
      .diag-error { color: #ff5370; } .diag-warning { color: #ffcb6b; }
      .diag-loc { color: var(--muted); } .diag-cat { color: var(--muted); }
      #output { padding: 10px 14px; overflow: auto; font: 13px/1.6 ui-monospace, monospace; white-space: pre-wrap; }
      .out-log { color: var(--fg); } .out-error { color: #ff5370; }
      .out-value { color: #82aaff; font-weight: 600; } .out-note { color: var(--muted); }
      h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
        margin: 0; padding: 8px 14px; border-bottom: 1px solid var(--line); }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Bynk Playground</h1>
        <select id="examples" title="Load an example" aria-label="Examples"></select>
        <button id="run" title="Compile &amp; run (⌘/Ctrl+Enter)">Run ▸</button>
        <button id="share" class="secondary">Share</button>
        <span class="spacer"></span>
        <span id="status">loading…</span>
      </header>
      <main>
        <div id="editor"></div>
        <div id="side">
          <div id="unsupported" hidden></div>
          <div id="diagnostics" class="empty"></div>
          <div style="display:grid; grid-template-rows:auto 1fr; min-height:0;">
            <h2>Output</h2>
            <div id="output"></div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
