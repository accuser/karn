[workspace]
members = ["karnc", "karn-fmt", "karn-lsp"]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
karnc = { path = "karnc" }
karn-fmt = { path = "karn-fmt" }
ariadne = "0.5"
clap = { version = "4", features = ["derive"] }
insta = { version = "1", features = ["yaml"] }
logos = "0.15"
regex = "1"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
tower-lsp = "0.20"
tokio = { version = "1", features = ["rt-multi-thread", "io-std", "macros", "sync", "time", "fs"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
serde_json = "1"

[profile.release]
lto = "thin"
