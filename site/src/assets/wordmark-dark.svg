<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 206 64" role="img" aria-label="bynk">
  <title>bynk</title>
  <!-- Monoline geometric wordmark (track §11): lower-case, a hard b/k frame around a
       soft y, the y's long descender as the one expressive stroke. Paper variant, for
       the dark theme. -->
  <g fill="none" stroke="#f4f4fb" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- b -->
    <line x1="21" y1="8" x2="21" y2="45" />
    <circle cx="34" cy="32" r="13" />
    <!-- y -->
    <line x1="66" y1="20" x2="84" y2="41" />
    <line x1="103" y1="20" x2="72" y2="60" />
    <!-- n -->
    <path d="M116 44 V27 C116 20 122 20 132 20 C142 20 148 20 148 27 V44" />
    <!-- k -->
    <line x1="164" y1="8" x2="164" y2="44" />
    <path d="M189 21 L165 33 L192 44" />
  </g>
</svg>
