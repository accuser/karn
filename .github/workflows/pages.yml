name: Deploy docs to GitHub Pages

on:
  # Publish when the docs (or the things they're generated from) change on main.
  push:
    branches: [main]
  # Allow a manual run from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build the book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # Pinned to match rust-toolchain.toml / ci.yml (one toolchain, no drift).
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # mdBook via a prebuilt binary (no source compile); pinned to 0.4.x —
      # mdbook-linkcheck targets it (0.5 changed the renderer protocol).
      # linkcheck stays `cargo install` (not in the prebuilt index, but small).
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: mdbook@0.4.51
      - name: Install mdbook-linkcheck
        run: cargo install mdbook-linkcheck --locked
      # book.toml references the three in-house preprocessors under
      # ../target/release/ (highlight, grammar, visuals).
      - name: Build the Bynk mdBook preprocessors
        run: cargo build --release -p mdbook-bynk-highlight -p mdbook-bynk-grammar -p mdbook-bynk-visuals
      # Builds the html backend (with highlighting) and the linkcheck backend;
      # a broken internal link fails the build, so broken docs never deploy.
      # Run from inside docs/ so the preprocessor `command` in book.toml
      # (`../target/release/mdbook-bynk-highlight`) resolves against the repo
      # root — mdbook spawns preprocessors relative to the process cwd, not the
      # book root.
      - name: Build the book
        working-directory: docs
        run: mdbook build
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          # With linkcheck enabled, the HTML site lands in book/html/.
          path: docs/book/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
