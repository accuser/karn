name: Release

# Tag-driven release. Pushing a version tag matching the manifests does the
# whole release in one shot:
#
#     git tag v0.16.0 && git push origin v0.16.0
#
#   -> verify (tests + tag/version match) -> build binaries + cut the GitHub
#      Release, AND publish the crates to crates.io and the grammar to npm
#      (both via OIDC Trusted Publishing, both re-run-safe — a version already
#      on a registry is skipped, so a partial publish can be retried by
#      re-running the run).
#
# The repo carries a single version across all manifests (see design/README.md
# "Versioning & release"): the increment PR runs scripts/bump-version.sh, and a
# release tag is cut when a version is to be shipped — so the GitHub Release the
# VS Code extension's bynkServerVersion pin points at always exists.
#
# The registry publishes are irreversible. The `verify` gate (tests + the
# tag/version match) stands in for an approval gate; once the repo is public, an
# Environment with required reviewers can add a one-click pause without GitHub
# Enterprise (tracked separately).
#
# A manual `workflow_dispatch` (Actions tab "Run workflow", or
# `gh workflow run release.yml --ref v0.16.0 -f publish_crates=true
# -f publish_npm=true`) re-runs just the registry publishes against the tag ref —
# the override / retry path. Pre-release tags like v0.16.0-rc1 work too.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      publish_crates:
        description: "Publish the crates to crates.io"
        type: boolean
        default: true
      publish_npm:
        description: "Publish the tree-sitter grammar to npm"
        type: boolean
        default: true

# Never run two releases for the same tag at once, and don't cancel one midway
# (publishing to crates.io/npm is irreversible).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  # Gate every publish on a green test run AND on the tag matching the version
  # baked into the manifests — so you can't accidentally ship v0.17.0 from a
  # tree that still says 0.16.0. "The manifests" is every versioned site in
  # the repo (single-version posture): the Cargo workspace, both npm packages,
  # and the extension's bynkServerVersion server-download pin.
  verify:
    name: Verify (tests + tag/version match)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      - name: Install TypeScript
        run: npm install -g typescript@5
      - name: Check tag/version match
        run: |
          ver="$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')"
          ext="$(node -p "require('./vscode-bynk/package.json').version")"
          pin="$(node -p "require('./vscode-bynk/package.json').bynkServerVersion")"
          ts="$(node -p "require('./tree-sitter-bynk/package.json').version")"
          fail=0
          test "$ext" = "$ver" || { echo "::error::vscode-bynk version $ext does not match workspace version $ver"; fail=1; }
          test "$pin" = "v$ver" || { echo "::error::vscode-bynk bynkServerVersion $pin does not match workspace version v$ver"; fail=1; }
          test "$ts" = "$ver" || { echo "::error::tree-sitter-bynk version $ts does not match workspace version $ver"; fail=1; }
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            tag="${GITHUB_REF_NAME#v}"   # strip leading v
            base="${tag%%-*}"            # drop any -rc1 / -beta suffix
            echo "ref=tag $GITHUB_REF_NAME  manifest=$ver"
            test "$base" = "$ver" || { echo "::error::tag $GITHUB_REF_NAME does not match workspace version $ver"; fail=1; }
          else
            echo "::notice::manual dispatch from $GITHUB_REF_NAME — will publish manifest version $ver"
          fi
          exit "$fail"
      - name: Run tests
        run: cargo test --workspace --locked
        env:
          BYNK_REQUIRE_TSC: "1"

  # Build native binaries on each host (no cross-compilation). fail-fast off so
  # one platform's failure doesn't abandon the others' artifacts.
  binaries:
    name: Build ${{ matrix.target }}
    needs: verify
    if: github.event_name == 'push' # tag push only — not the manual registry-publish dispatch
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # arm64 Linux: the free `ubuntu-24.04-arm` runners serve public
          # repos — re-enabled at the public flip (June 2026).
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - name: Build bynkc + bynk + bynkc-lsp
        run: cargo build --release --locked --target ${{ matrix.target }} -p bynkc -p bynk -p bynk-lsp

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release"
          stage="bynk-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$stage"
          cp "$bin/bynkc" "$bin/bynk" "$bin/bynkc-lsp" LICENSE-MIT LICENSE-APACHE "$stage/"
          tar czf "$stage.tar.gz" "$stage"
          # Raw server binary for the VS Code extension's download-on-activate
          # (it fetches a single verified file, no archive extraction).
          cp "$bin/bynkc-lsp" "bynkc-lsp-${{ matrix.target }}"
          {
            echo "ASSET=$stage.tar.gz"
            echo "RAW=bynkc-lsp-${{ matrix.target }}"
          } >> "$GITHUB_ENV"
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release"
          $stage = "bynk-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "$bin/bynkc.exe","$bin/bynk.exe","$bin/bynkc-lsp.exe","LICENSE-MIT","LICENSE-APACHE" $stage
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          $raw = "bynkc-lsp-${{ matrix.target }}.exe"
          Copy-Item "$bin/bynkc-lsp.exe" $raw
          "ASSET=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RAW=$raw"        | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.RAW }}
          if-no-files-found: error

  # Collect every platform's archive, checksum them, attest build provenance,
  # and attach everything to one GitHub Release.
  github-release:
    name: Publish GitHub Release
    needs: binaries
    if: github.event_name == 'push' # tag push only — not the manual registry-publish dispatch
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
      id-token: write # OIDC for build-provenance attestation
      attestations: write # record the attestation
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
      # One SHA256SUMS over the archives AND the raw server binaries (basenames,
      # so they match the flat asset names a consumer downloads). The VS Code
      # extension's download-on-activate verifies `bynkc-lsp-<target>` against
      # this file.
      - name: Checksums
        working-directory: dist
        run: |
          shopt -s globstar nullglob
          files=(**/*.tar.gz **/*.zip **/bynkc-lsp-*)
          sha256sum "${files[@]}" | awk '{ n = $2; sub(/.*\//, "", n); print $1 "  " n }' > SHA256SUMS
          cat SHA256SUMS
      # Signed SLSA provenance for each archive and raw binary (verifiable with
      # `gh attestation verify`). Subject is the artefacts, not the sums file.
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: "dist/**/*.tar.gz, dist/**/*.zip, dist/**/bynkc-lsp-*"
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/bynkc-lsp-*
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Publish the workspace crates in dependency order. Modern cargo waits for each
  # crate to appear in the index before returning, so the next publish resolves.
  # Runs automatically on a version-tag push (alongside the GitHub Release), and
  # on a manual dispatch with publish_crates checked (a re-run / override). The
  # per-crate "already on crates.io?" guard makes it re-run-safe and tolerant of
  # a tag that re-publishes unchanged crates (a partial publish can be retried).
  #
  # Auth — OIDC Trusted Publishing (no long-lived token). Requires a Trusted
  # Publisher (owner `accuser`, repo `bynk`, workflow `release.yml`, no
  # environment) registered on EACH published crate at crates.io. Trusted
  # Publishing can only attach to a crate that already exists, so the FIRST
  # publish of a new/renamed name must be done with a token via the companion
  # `release-bootstrap.yml` workflow; configure the Trusted Publisher and switch
  # back here for every subsequent release.
  publish-crates:
    name: Publish to crates.io
    needs: verify
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_crates) }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for crates.io Trusted Publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1
        id: auth
      - name: cargo publish (bynk-grammar -> bynk-syntax -> bynk-render -> bynk-fmt -> bynk-check -> bynk-emit -> bynk-strip -> bynk-ide -> bynkc -> bynk -> bynk-lsp)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          ver="$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')"
          for crate in bynk-grammar bynk-syntax bynk-render bynk-fmt bynk-check bynk-emit bynk-strip bynk-ide bynkc bynk bynk-lsp; do
            if curl -sfL -A "bynk-release (github actions; accuser/bynk)" \
                 "https://crates.io/api/v1/crates/$crate/$ver" -o /dev/null; then
              echo "::notice::$crate@$ver already on crates.io — skipping"
            else
              cargo publish --locked -p "$crate"
            fi
          done

  # Publish the tree-sitter grammar (node bindings + grammar source) to npm.
  # Runs automatically on a version-tag push, and on a manual dispatch with
  # publish_npm checked (re-run / override). The "already on npm?" guard makes
  # it re-run-safe.
  #
  # Auth — OIDC Trusted Publishing (no long-lived token). A Trusted Publisher
  # (this repo + this workflow) is configured for `tree-sitter-bynk` on
  # npmjs.com; with `id-token: write` and npm >= 11.5.1 (both wired below) the
  # CLI authenticates via OIDC and records provenance automatically — no
  # NODE_AUTH_TOKEN. As with the crates, the FIRST publish of a new/renamed
  # package must be done with a token via `release-bootstrap.yml`, since the
  # Trusted Publisher can only be configured on an existing package.
  publish-npm:
    name: Publish to npm
    needs: verify
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_npm) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing
    defaults:
      run:
        working-directory: tree-sitter-bynk
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing + provenance need npm >= 11.5.1 (newer than Node 20's).
      - name: Update npm
        run: npm install -g npm@latest
      - name: Install deps
        run: npm ci
      - name: Regenerate parser from grammar.js
        run: npx tree-sitter generate
      - name: Publish (OIDC; skip if already published)
        # No NODE_AUTH_TOKEN — npm authenticates via the OIDC id-token under
        # Trusted Publishing and records a signed provenance attestation.
        run: |
          name="$(node -p "require('./package.json').name")"
          ver="$(node -p "require('./package.json').version")"
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "::notice::$name@$ver already on npm — skipping"
          else
            npm publish --access public --provenance
          fi
