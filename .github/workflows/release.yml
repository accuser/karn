name: Release

# Two-phase release, so the irreversible registry publishes stay behind a
# deliberate manual step (the no-cost stand-in for an environment approval gate,
# which needs GitHub Enterprise on a private repo):
#
#   1. Push a version tag matching the manifests, e.g.
#        git tag v0.16.0 && git push origin v0.16.0
#      -> builds binaries and cuts the GitHub Release automatically.
#   2. Once you've eyeballed that release, manually publish to the registries
#      from the Actions tab ("Run workflow"), or:
#        gh workflow run release.yml --ref v0.16.0 \
#          -f publish_crates=true -f publish_npm=true
#      Run it against the *tag* ref so the tag/version guard still applies.
#
# Pre-release tags like v0.16.0-rc1 work for phase 1 too.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      publish_crates:
        description: "Publish the crates to crates.io"
        type: boolean
        default: true
      publish_npm:
        description: "Publish the tree-sitter grammar to npm"
        type: boolean
        default: true

# Never run two releases for the same tag at once, and don't cancel one midway
# (publishing to crates.io/npm is irreversible).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  # Gate every publish on a green test run AND on the tag matching the version
  # baked into the manifests — so you can't accidentally ship v0.17.0 from a
  # tree that still says 0.16.0.
  verify:
    name: Verify (tests + tag/version match)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install TypeScript
        run: npm install -g typescript@5
      - name: Check tag/version match
        run: |
          ver="$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            tag="${GITHUB_REF_NAME#v}"   # strip leading v
            base="${tag%%-*}"            # drop any -rc1 / -beta suffix
            echo "ref=tag $GITHUB_REF_NAME  manifest=$ver"
            test "$base" = "$ver" || { echo "::error::tag $GITHUB_REF_NAME does not match workspace version $ver"; exit 1; }
          else
            echo "::notice::manual dispatch from $GITHUB_REF_NAME — will publish manifest version $ver"
          fi
      - name: Run tests
        run: cargo test --workspace --locked
        env:
          KARN_REQUIRE_TSC: "1"

  # Build native binaries on each host (no cross-compilation). fail-fast off so
  # one platform's failure doesn't abandon the others' artifacts.
  binaries:
    name: Build ${{ matrix.target }}
    needs: verify
    if: github.event_name == 'push' # phase 1: tag push only
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # arm64 Linux: the free `ubuntu-24.04-arm` runners serve public
          # repos — re-enabled at the public flip (June 2026).
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build karnc + karnc-lsp
        run: cargo build --release --locked --target ${{ matrix.target }} -p karnc -p karn-lsp

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release"
          stage="karn-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$stage"
          cp "$bin/karnc" "$bin/karnc-lsp" LICENSE-MIT LICENSE-APACHE "$stage/"
          tar czf "$stage.tar.gz" "$stage"
          # Raw server binary for the VS Code extension's download-on-activate
          # (it fetches a single verified file, no archive extraction).
          cp "$bin/karnc-lsp" "karnc-lsp-${{ matrix.target }}"
          {
            echo "ASSET=$stage.tar.gz"
            echo "RAW=karnc-lsp-${{ matrix.target }}"
          } >> "$GITHUB_ENV"
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release"
          $stage = "karn-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "$bin/karnc.exe","$bin/karnc-lsp.exe","LICENSE-MIT","LICENSE-APACHE" $stage
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          $raw = "karnc-lsp-${{ matrix.target }}.exe"
          Copy-Item "$bin/karnc-lsp.exe" $raw
          "ASSET=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RAW=$raw"        | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.RAW }}
          if-no-files-found: error

  # Collect every platform's archive, checksum them, attest build provenance,
  # and attach everything to one GitHub Release.
  github-release:
    name: Publish GitHub Release
    needs: binaries
    if: github.event_name == 'push' # phase 1: tag push only
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
      id-token: write # OIDC for build-provenance attestation
      attestations: write # record the attestation
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
      # One SHA256SUMS over the archives AND the raw server binaries (basenames,
      # so they match the flat asset names a consumer downloads). The VS Code
      # extension's download-on-activate verifies `karnc-lsp-<target>` against
      # this file.
      - name: Checksums
        working-directory: dist
        run: |
          shopt -s globstar nullglob
          files=(**/*.tar.gz **/*.zip **/karnc-lsp-*)
          sha256sum "${files[@]}" | awk '{ n = $2; sub(/.*\//, "", n); print $1 "  " n }' > SHA256SUMS
          cat SHA256SUMS
      # Signed SLSA provenance for each archive and raw binary (verifiable with
      # `gh attestation verify`). Subject is the artefacts, not the sums file.
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/**/*.tar.gz, dist/**/*.zip, dist/**/karnc-lsp-*"
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/karnc-lsp-*
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Publish the four crates in dependency order. Modern cargo waits for each
  # crate to appear in the index before returning, so the next publish resolves.
  # Phase 2: runs only on a manual dispatch with publish_crates checked — the
  # deliberate gate before this irreversible step.
  #
  # Auth is OIDC Trusted Publishing (no long-lived token). One-time setup: on
  # crates.io, add a Trusted Publisher (this repo + this workflow) to EACH crate
  # — karn-grammar, karnc, karn-fmt, karn-lsp — then the CARGO_REGISTRY_TOKEN
  # secret can be deleted. The first publish of a brand-new crate name still
  # needs a token (Trusted Publishing can't be pre-registered on a name that
  # doesn't exist yet).
  publish-crates:
    name: Publish to crates.io
    needs: verify
    if: github.event_name == 'workflow_dispatch' && inputs.publish_crates
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for crates.io Trusted Publishing
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: cargo publish (karn-grammar -> karnc -> karn-fmt -> karn-lsp)
        run: |
          cargo publish --locked -p karn-grammar
          cargo publish --locked -p karnc
          cargo publish --locked -p karn-fmt
          cargo publish --locked -p karn-lsp
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Publish the tree-sitter grammar (node bindings + grammar source) to npm.
  # Phase 2: runs only on a manual dispatch with publish_npm checked. Uses the
  # NPM_TOKEN for now; once the first version is live you can configure a Trusted
  # Publisher on npmjs.com and the CLI will switch to OIDC automatically
  # (id-token permission + npm >= 11.5.1 are already wired below), at which point
  # NPM_TOKEN can be removed.
  publish-npm:
    name: Publish to npm
    needs: verify
    if: github.event_name == 'workflow_dispatch' && inputs.publish_npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing (once configured on npmjs.com)
    defaults:
      run:
        working-directory: tree-sitter-karn
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing + provenance need npm >= 11.5.1 (newer than what Node
      # 20 bundles). Harmless for the token path.
      - name: Update npm
        run: npm install -g npm@latest
      - name: Install deps
        run: npm ci
      - name: Regenerate parser from grammar.js
        run: npx tree-sitter generate
      - name: Publish
        # --provenance records a signed build-provenance attestation on npm
        # (needs the id-token permission above + npm >= 11.5.1, both wired).
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
