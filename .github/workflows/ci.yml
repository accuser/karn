name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Weekly health check: re-run the full pipeline so dependency/advisory drift
  # (a freshly published RUSTSEC advisory, a bitrotted dep) is caught even when
  # no one has opened a PR. Mondays 07:00 UTC.
  schedule:
    - cron: "0 7 * * 1"

# A new push to a PR branch cancels the superseded run for that ref; the deploy
# pipeline (pages.yml) has its own non-cancelling concurrency group.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs that need more opt in (changes needs
# pull-requests:read for the PR file list; dependency-review reads the diff).
permissions:
  contents: read

# The toolchain version lives in rust-toolchain.toml; the dtolnay ref below is
# pinned to match so the runner installs exactly one toolchain (with the
# rustfmt/clippy components the gates need). The `msrv` job deliberately uses a
# different (older) toolchain to verify the declared rust-version.

jobs:
  # ---------------------------------------------------------------------------
  # Change detection. Every expensive job is gated on this so a docs-only or
  # extension-only PR doesn't pay for the full multi-OS test matrix. The gating
  # is safe against the required-checks ruleset because branch protection
  # requires only the `ci-green` aggregator below — not the individual (now
  # skippable) job names.
  #
  # `all` is the escape hatch: on push/main and the weekly schedule (anything
  # that isn't a PR), or when a global file changed (a workflow, the lockfile,
  # the toolchain), every job runs regardless of which paths the diff touched.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      docs: ${{ steps.filter.outputs.docs }}
      extension: ${{ steps.filter.outputs.extension }}
      grammar: ${{ steps.filter.outputs.grammar }}
      decisions: ${{ steps.filter.outputs.decisions }}
      all: ${{ steps.all.outputs.value }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          # `global` is anchored into every filter that a global change must
          # invalidate; on its own it also drives the `all` short-circuit below.
          filters: |
            global: &global
              - '.github/workflows/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
            rust:
              - *global
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'clippy.toml'
              - 'deny.toml'
            docs:
              - *global
              - 'docs/**'
              - 'examples/**'
            extension:
              - *global
              - 'vscode-karn/**'
            grammar:
              - *global
              - 'tree-sitter-karn/**'
            decisions:
              - *global
              - 'design/decisions/**'
      # Collapse "not a PR" (push/schedule) and "a global file changed" into one
      # boolean the downstream `if:`s can OR against. Pinned to the `global`
      # output so a lockfile/toolchain/workflow change fans out to everything.
      - id: all
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ steps.filter.outputs.global }}" = "true" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

  fmt:
    name: Formatting (cargo fmt)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          components: rustfmt
      # No build/cache: rustfmt parses, it doesn't compile.
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Lint (clippy -D warnings)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # --all-targets covers tests/examples/benches, not just the libs/bins.
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    # Matrix across all three host OSes: fixtures compare emitted TypeScript
    # byte-for-byte, so a path-separator / line-ending / tsc-shim difference can
    # pass on Linux and only surface at release. `.gitattributes` forces LF on
    # checkout so the byte comparison is stable on Windows. fail-fast off so one
    # OS's failure doesn't abandon the others' results.
    #
    # Gated on `docs` as well as `rust`: karnc's suite reads docs/src/** — the
    # doc_examples compile gate and the reference-page assertions — so a docs
    # change can legitimately flip a test.
    name: Test suite (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.all == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      # `tsc` is needed by the tsc-verify stage and the `karnc test` fixtures.
      # Pinned to v5: an unpinned `typescript` could turn CI red on a new TS
      # major with no repo change, and the tsc_verify fallback already pins @5.
      - name: Install TypeScript
        run: npm install -g typescript@5
      # `cargo test --workspace` runs every crate's suite. karnc's includes:
      #   - doc_examples        — the example-compilation gate (docs/src/**)
      #   - diagnostics_registry / keywords_reference / cli_reference / grammar_reference
      #     — assert the generated reference pages are up to date
      #   - the fixture suite and the tsc-strict verification stage
      # The other crates (karn-fmt, karn-lsp, karn-grammar, the mdbook
      # preprocessors) contribute their own unit tests.
      # --locked: fail if Cargo.lock would change (no silent lockfile drift).
      # KARN_REQUIRE_TSC makes a missing `tsc` a hard failure rather than a skip.
      - name: Run tests
        run: cargo test --workspace --locked
        env:
          KARN_REQUIRE_TSC: "1"

  msrv:
    # Verify the declared rust-version (Cargo.toml) actually builds, rather than
    # asserting an MSRV nobody checks. If this fails, raise rust-version to match
    # what the code needs — don't lower the toolchain here.
    #
    # This leg only checks 1.85 because the dtolnay action exports
    # RUSTUP_TOOLCHAIN, which outranks the repo's rust-toolchain.toml (1.95) in
    # rustup's precedence. Swapping the toolchain action for one that doesn't
    # set that env var would silently turn this into a second 1.95 check.
    name: MSRV (cargo check on declared rust-version)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@c93f4f9c67595668add93d3d6895795ce52d8c2d # 1.85.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check on MSRV toolchain
        run: cargo check --workspace --locked

  docs:
    # Gated on `rust` as well as `docs`: the book is rendered through the three
    # in-house mdBook preprocessors (Rust), so a Rust change can change output.
    name: Build the book (html + linkcheck)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # mdBook via a prebuilt binary (no source compile). Pinned to 0.4.x —
      # mdbook-linkcheck targets it; 0.5 changed the renderer protocol. linkcheck
      # is still `cargo install` (not in the prebuilt index), but it's small.
      # Mirrors pages.yml so broken docs fail on the PR, not at deploy time.
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2
        with:
          tool: mdbook@0.4.51
      - name: Install mdbook-linkcheck
        run: cargo install mdbook-linkcheck --locked
      # book.toml references the three in-house preprocessors under
      # ../target/release/ (highlight, grammar, visuals).
      - name: Build the Karn mdBook preprocessors
        run: cargo build --release -p mdbook-karn-highlight -p mdbook-karn-grammar -p mdbook-karn-visuals
      # Run from inside docs/ so the preprocessor `command` paths in book.toml
      # resolve against the repo root (mdbook spawns preprocessors relative to
      # the process cwd, not the book root). A broken internal link fails here.
      - name: Build the book
        working-directory: docs
        run: mdbook build

  extension:
    # Build, type-check, bundle, and package the VS Code extension, then assert
    # the bundle has no unresolved external `require` other than `vscode`. This
    # is the gate that would have caught the 0.20.0 packaging crash (a bundled
    # dependency, vscode-languageserver-protocol, missing from the VSIX).
    name: VS Code extension (build + package)
    needs: changes
    if: needs.changes.outputs.extension == 'true' || needs.changes.outputs.all == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-karn
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
      - name: Type-check
        run: npm run check
      - name: Bundle (esbuild)
        run: npm run build
      - name: Smoke — no unbundled external requires
        run: node scripts/check-bundle.mjs
      - name: Package the VSIX
        run: npx --yes @vscode/vsce package --no-dependencies --skip-license

  extension-tests:
    # Launch a real VS Code instance with the extension + a fixture workspace
    # and run the Mocha specs inside the extension host (@vscode/test-electron).
    # This is the only job that exercises runtime *client* behaviour — the class
    # of bug the #143 CodeLens-click crash fell into (it passed tsc, esbuild,
    # the bundle guard, and `vsce package`, yet threw when clicked). The harness
    # needs a locally-built `karnc-lsp` on PATH (so activation never hits the
    # download path) and, on Linux, a virtual display (xvfb).
    #
    # Gated on `rust` as well as `extension`: it builds karn-lsp from source, so
    # a server change must re-run the client integration suite.
    name: VS Code extension (integration tests)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.extension == 'true' || needs.changes.outputs.all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build the language server
        run: cargo build --release -p karn-lsp
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      - name: Install deps
        working-directory: vscode-karn
        run: npm ci
      - name: Integration tests (xvfb)
        working-directory: vscode-karn
        run: xvfb-run -a npm test

  grammar:
    # Run the tree-sitter corpus so grammar drift fails a PR. Without this the
    # grammar is only ever `generate`d (at npm-publish time), never `test`ed.
    name: tree-sitter grammar (corpus)
    needs: changes
    if: needs.changes.outputs.grammar == 'true' || needs.changes.outputs.all == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tree-sitter-karn
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
      - name: Generate parser
        run: npx tree-sitter generate
      - name: Test corpus
        run: npx tree-sitter test

  drift:
    # The two cross-component drift guards read files that live OUTSIDE the
    # `rust`/`docs` filters, so the main `test` job's gate doesn't cover a
    # one-sided change to them:
    #   - karnc/tests/grammar_reference.rs reads tree-sitter-karn/src/grammar.json
    #     (a `grammar` input) and asserts docs/src/reference/grammar-appendix.md
    #     still matches the rendered EBNF;
    #   - karn-lsp/tests/legend_drift.rs reads vscode-karn/package.json (an
    #     `extension` input) and asserts the semantic-token legend names match.
    #   - karnc/tests/decisions_index.rs reads design/decisions/**.md (a
    #     `decisions` input) and asserts decisions/README.md indexes every ADR.
    # This job runs them exactly when `test` would NOT but a drift input changed,
    # so a guard can never be skipped — and there is no duplicate run when `test`
    # already executes them (the `if` is the complement of `test`'s gate). The
    # guards are OS-independent and need no node/tsc, so one runner suffices.
    name: Cross-component drift guards
    needs: changes
    if: >-
      (needs.changes.outputs.grammar == 'true' || needs.changes.outputs.extension == 'true'
        || needs.changes.outputs.decisions == 'true')
      && needs.changes.outputs.rust != 'true'
      && needs.changes.outputs.docs != 'true'
      && needs.changes.outputs.all != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Grammar appendix ↔ tree-sitter grammar
        run: cargo test -p karnc --test grammar_reference
      - name: LSP legend ↔ extension package.json
        run: cargo test -p karn-lsp --test legend_drift
      - name: Decision-record index ↔ ADR files
        run: cargo test -p karnc --test decisions_index

  audit:
    # Scans Cargo.lock against the RustSec advisory database. Only the lockfile
    # and manifests matter here, both of which live in the `rust`/`global`
    # filters; the weekly schedule (an `all` run) catches advisories published
    # after a PR merges.
    name: Security audit (cargo audit)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # Define the toolchain explicitly (rust-toolchain.toml would otherwise
      # trigger an implicit download when `cargo audit` dispatches in-repo).
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      # Prebuilt binary — avoids compiling cargo-audit from source on every run.
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2
        with:
          tool: cargo-audit
      - name: Audit dependencies
        run: cargo audit

  deny:
    # Licence-policy enforcement, duplicate/wildcard detection, and source
    # allowlisting (deny.toml). Complements `audit` — advisories overlap by
    # design (defence in depth); the unique value is licences + bans + sources.
    name: Supply chain (cargo-deny)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check

  dependency-review:
    # On PRs, flag newly-introduced dependencies that carry known advisories or
    # disallowed licences before they merge. Complements Dependabot (which acts
    # after merge).
    #
    # Gated on repository visibility: the dependency-review API needs GitHub
    # Advanced Security on private repos, so until the v1.0.0 public flip this
    # job would error on every PR. The gate self-heals — the job starts
    # running the moment the repo goes public, no workflow edit needed.
    name: Dependency review (PRs)
    if: github.event_name == 'pull_request' && !github.event.repository.private
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5

  ci-green:
    # Single required status check. Branch protection requires THIS job and
    # nothing else, so the path-gated jobs above can skip freely and renaming
    # one no longer desyncs the ruleset. `if: always()` makes it report even
    # when upstreams are skipped or fail; it goes red only if a needed job
    # actually failed or was cancelled (a skipped job is a pass).
    name: CI green
    if: always()
    needs:
      - changes
      - fmt
      - clippy
      - test
      - msrv
      - docs
      - extension
      - extension-tests
      - grammar
      - drift
      - audit
      - deny
      - dependency-review
    runs-on: ubuntu-latest
    steps:
      - name: Verify no upstream job failed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "Upstream results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::An upstream job reported '$r'."
              exit 1
            fi
          done
          echo "All upstream jobs succeeded or were skipped."
