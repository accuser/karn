name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test suite (incl. doc-example gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # `tsc` is needed by the tsc-verify stage and the `karnc test` fixtures.
      - name: Install TypeScript
        run: npm install -g typescript
      # `cargo test` runs the whole karnc suite, which includes:
      #   - doc_examples        — the example-compilation gate (docs/src/**)
      #   - diagnostics_registry / keywords_reference / cli_reference
      #     — assert the generated reference pages are up to date
      #   - the fixture suite and the tsc-strict verification stage
      - name: Run tests
        run: cargo test -p karnc

  docs:
    name: Build the book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: British-English lint
        run: bash docs/tools/check-british-english.sh
      - name: Install mdBook + linkcheck
        run: cargo install mdbook mdbook-linkcheck --locked
      # book.toml references ../target/release/mdbook-karn-highlight, so build it
      # before the book.
      - name: Build the Karn highlighting preprocessor
        run: cargo build --release -p mdbook-karn-highlight
      # `mdbook build` runs the html backend (with karn highlighting) and the
      # linkcheck backend; a broken internal link fails the build.
      - name: Build the book (with link checking)
        run: mdbook build docs
