name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test suite (incl. doc-example gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # `tsc` is needed by the tsc-verify stage and the `karnc test` fixtures.
      - name: Install TypeScript
        run: npm install -g typescript
      # `cargo test` runs the whole karnc suite, which includes:
      #   - doc_examples        — the example-compilation gate (docs/src/**)
      #   - diagnostics_registry / keywords_reference / cli_reference / grammar_reference
      #     — assert the generated reference pages are up to date
      #   - the fixture suite and the tsc-strict verification stage
      # KARN_REQUIRE_TSC makes a missing `tsc` a hard failure rather than a skip.
      - name: Run tests
        run: cargo test -p karnc
        env:
          KARN_REQUIRE_TSC: "1"
