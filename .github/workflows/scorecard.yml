name: Scorecard

# OpenSSF Scorecard: an automated supply-chain posture audit (branch
# protection, pinned dependencies, token permissions, dangerous workflow
# patterns, …). Results are uploaded to the repo's code-scanning tab and
# published to the public OpenSSF API so the README badge stays current.
#
# Public-repo only: the SARIF upload needs code scanning and `publish_results`
# needs OIDC — both available now the repo is public. The actions below are
# SHA-pinned (with the human-readable tag in a trailing comment), the same
# posture this workflow scores the repo on.

on:
  # Re-score whenever a branch-protection rule changes — Scorecard's headline
  # checks are about exactly that surface.
  branch_protection_rule:
  # Weekly drift check, offset from CI's Monday 07:00 so the two don't contend.
  schedule:
    - cron: "20 7 * * 1"
  push:
    branches: [main]

# Least privilege by default; the analysis job opts into the writes it needs.
permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Upload the SARIF result to the code-scanning dashboard.
      security-events: write
      # Mint the OIDC token Scorecard uses to publish to the OpenSSF API.
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the public OpenSSF API (enables the README badge).
          publish_results: true

      # Retain the SARIF as an artifact too, so a result is inspectable even if
      # the code-scanning upload is throttled.
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: results.sarif
